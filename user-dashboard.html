<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNITY BANK GTC - User Dashboard</title>
  
  <!-- Supabase Configuration -->
  <script>
    // Supabase Configuration
    const SUPABASE_URL = 'https://qrfkfvknvlagcithwhsh.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_hZ0CRvlLxSqNMzdHWqEuXA_SwWB3s9X';
  </script>
  
  <!-- Supabase Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #2e48b6 0%, #1d2f77 100%); }
    .card-gradient-0 { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
    .card-gradient-1 { background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); }
    .card-gradient-2 { background: linear-gradient(135deg, #10b981 0%, #047857 100%); }
    .card-gradient-3 { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
    .card-gradient-4 { background: linear-gradient(135deg, #f97316 0%, #c2410c 100%); }
    .card-gradient-5 { background: linear-gradient(135deg, #ec4899 0%, #be185d 100%); }
    .card-gradient-6 { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); }
    .card-gradient-7 { background: linear-gradient(135deg, #14b8a6 0%, #0f766e 100%); }
    .card-gradient-8 { background: linear-gradient(135deg, #06b6d4 0%, #0e7490 100%); }
    .card-gradient-9 { background: linear-gradient(135deg, #f59e0b 0%, #b45309 100%); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- Header -->
  <header class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center space-x-2">
          <div class="w-10 h-10 gradient-bg rounded-lg flex items-center justify-center">
            <span class="text-white font-bold">U</span>
          </div>
          <span class="font-bold text-xl text-[#1d2f77]">UNITYBANKGTC</span>
        </div>
        <div class="flex items-center space-x-4">
          <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-gray-100">
            <i data-lucide="moon" class="w-5 h-5" id="themeIcon"></i>
          </button>
          <button onclick="logout()" class="p-2 rounded-lg text-red-500 hover:bg-red-50">
            <i data-lucide="log-out" class="w-5 h-5"></i>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Welcome -->
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-gray-900" id="welcomeText">Welcome, User</h1>
      <p class="text-gray-500">Account Number: <span id="accountNumber">-</span></p>
    </div>

    <!-- Balance Card -->
    <div class="bg-white rounded-2xl shadow-lg p-6 mb-8">
      <div class="flex items-center justify-between mb-4">
        <span class="text-gray-500">Total Balance</span>
        <button onclick="toggleBalance()" class="text-gray-500 hover:text-gray-700">
          <i data-lucide="eye" class="w-5 h-5" id="balanceEye"></i>
        </button>
      </div>
      <div class="text-4xl font-bold text-[#2e48b6]" id="balanceDisplay">$0.00</div>
      <div class="mt-4 flex space-x-4">
        <button onclick="window.location.href='transfer.html'" 
          class="flex-1 gradient-bg text-white font-medium py-3 rounded-xl hover:opacity-90 transition-opacity flex items-center justify-center">
          <i data-lucide="send" class="w-4 h-4 mr-2"></i>
          Send Money
        </button>
        <button onclick="window.location.href='virtual-card.html'" 
          class="flex-1 border border-gray-300 text-gray-700 font-medium py-3 rounded-xl hover:bg-gray-50 transition-colors flex items-center justify-center">
          <i data-lucide="credit-card" class="w-4 h-4 mr-2"></i>
          Virtual Card
        </button>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <button onclick="window.location.href='transfer.html'" class="bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition-shadow text-center">
        <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-2">
          <i data-lucide="send" class="w-6 h-6 text-blue-600"></i>
        </div>
        <span class="text-sm font-medium text-gray-700">Send</span>
      </button>
      <button onclick="window.location.href='virtual-card.html'" class="bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition-shadow text-center">
        <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-2">
          <i data-lucide="credit-card" class="w-6 h-6 text-purple-600"></i>
        </div>
        <span class="text-sm font-medium text-gray-700">Card</span>
      </button>
      <button onclick="window.location.href='profile.html'" class="bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition-shadow text-center">
        <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-2">
          <i data-lucide="user" class="w-6 h-6 text-green-600"></i>
        </div>
        <span class="text-sm font-medium text-gray-700">Profile</span>
      </button>
      <button onclick="window.location.href='support.html'" class="bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition-shadow text-center">
        <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-2">
          <i data-lucide="message-circle" class="w-6 h-6 text-orange-600"></i>
        </div>
        <span class="text-sm font-medium text-gray-700">Support</span>
      </button>
    </div>

    <!-- Recent Transactions -->
    <div class="bg-white rounded-2xl shadow-lg p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold text-gray-900">Recent Transactions</h2>
        <button onclick="window.location.href='transactions.html'" class="text-[#2e48b6] text-sm font-medium hover:underline">
          View All
        </button>
      </div>
      <div id="transactionsList" class="space-y-4">
        <div class="text-center py-8">
          <i data-lucide="wallet" class="w-12 h-12 text-gray-300 mx-auto mb-2"></i>
          <p class="text-gray-500">No transactions yet</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Account Frozen Modal -->
  <div id="freezeModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl p-8 max-w-md mx-4 text-center">
      <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <i data-lucide="alert-circle" class="w-8 h-8 text-red-600"></i>
      </div>
      <h3 class="text-xl font-bold text-red-600 mb-2">Account Frozen</h3>
      <p class="text-gray-600 mb-6">Your account has been frozen. Please contact customer support to resolve this issue.</p>
      <button onclick="closeFreezeModal()" class="w-full gradient-bg text-white font-medium py-3 rounded-xl">
        I Understand
      </button>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="fixed top-4 right-4 px-6 py-4 rounded-xl shadow-lg transform translate-x-full transition-transform duration-300 z-50 hidden">
    <div class="flex items-center space-x-3">
      <i data-lucide="alert-circle" class="w-5 h-5" id="toastIcon"></i>
      <span id="toastMessage"></span>
    </div>
  </div>

  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    // Initialize Supabase client
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Currency symbols
    const CURRENCY_SYMBOLS = {
      USD: '$', GBP: '£', EUR: '€', JPY: '¥', THB: '฿', BRL: 'R$', PHP: '₱', PLN: 'zł', UAH: '₴'
    };

    let currentUser = null;
    let userProfile = null;
    let showBalance = true;

    // Show toast notification
    function showToast(message, type = 'error') {
      const toast = document.getElementById('toast');
      const toastMessage = document.getElementById('toastMessage');
      const toastIcon = document.getElementById('toastIcon');
      
      toastMessage.textContent = message;
      toast.classList.remove('hidden', 'translate-x-full');
      toast.classList.add('translate-x-0');
      
      if (type === 'success') {
        toast.classList.add('bg-green-500', 'text-white');
        toast.classList.remove('bg-red-500');
        toastIcon.setAttribute('data-lucide', 'check-circle');
      } else {
        toast.classList.add('bg-red-500', 'text-white');
        toast.classList.remove('bg-green-500');
        toastIcon.setAttribute('data-lucide', 'alert-circle');
      }
      lucide.createIcons();
      
      setTimeout(() => {
        toast.classList.add('translate-x-full');
        toast.classList.remove('translate-x-0');
        setTimeout(() => toast.classList.add('hidden'), 300);
      }, 3000);
    }

    // Toggle balance visibility
    function toggleBalance() {
      showBalance = !showBalance;
      updateBalanceDisplay();
      const eyeIcon = document.getElementById('balanceEye');
      eyeIcon.setAttribute('data-lucide', showBalance ? 'eye' : 'eye-off');
      lucide.createIcons();
    }

    // Update balance display
    function updateBalanceDisplay() {
      const balance = userProfile?.balance || 0;
      const currency = userProfile?.currency || 'USD';
      const symbol = CURRENCY_SYMBOLS[currency] || '$';
      document.getElementById('balanceDisplay').textContent = showBalance 
        ? `${symbol}${balance.toLocaleString('en-US', { minimumFractionDigits: 2 })}`
        : '****';
    }

    // Toggle theme
    function toggleTheme() {
      const isDark = document.body.classList.contains('dark');
      if (isDark) {
        document.body.classList.remove('dark');
        document.body.classList.add('bg-gray-50');
        document.getElementById('themeIcon').setAttribute('data-lucide', 'moon');
      } else {
        document.body.classList.add('dark');
        document.body.classList.remove('bg-gray-50');
        document.body.classList.add('bg-gray-900');
        document.getElementById('themeIcon').setAttribute('data-lucide', 'sun');
      }
      lucide.createIcons();
    }

    // Close freeze modal
    function closeFreezeModal() {
      document.getElementById('freezeModal').classList.add('hidden');
    }

    // Logout
    async function logout() {
      await supabase.auth.signOut();
      window.location.href = 'login.html';
    }

    // Load user data
    async function loadUserData() {
      const { data: { session } } = await supabase.auth.getSession();
      
      if (!session) {
        window.location.href = 'login.html';
        return;
      }
      
      currentUser = session.user;
      
      // Get user profile
      const { data: profile, error } = await supabase
        .from('profiles')
        .select('*')
        .eq('id', currentUser.id)
        .single();
      
      if (error || !profile) {
        showToast('Failed to load profile');
        return;
      }
      
      userProfile = profile;
      
      // Check if admin
      if (profile.role === 'admin') {
        window.location.href = 'admin-dashboard.html';
        return;
      }
      
      // Check if frozen
      if (profile.status === 'frozen') {
        document.getElementById('freezeModal').classList.remove('hidden');
      }
      
      // Update UI
      document.getElementById('welcomeText').textContent = `Welcome, ${profile.full_name}`;
      document.getElementById('accountNumber').textContent = profile.account_number;
      updateBalanceDisplay();
      
      // Load transactions
      loadTransactions();
      
      // Subscribe to real-time updates
      subscribeToUpdates();
    }

    // Load transactions
    async function loadTransactions() {
      const { data: transactions, error } = await supabase
        .from('transactions')
        .select('*')
        .or(`from_account_id.eq.${currentUser.id},to_account_id.eq.${currentUser.id}`)
        .order('created_at', { ascending: false })
        .limit(5);
      
      if (error) return;
      
      const container = document.getElementById('transactionsList');
      
      if (!transactions || transactions.length === 0) {
        container.innerHTML = `
          <div class="text-center py-8">
            <i data-lucide="wallet" class="w-12 h-12 text-gray-300 mx-auto mb-2"></i>
            <p class="text-gray-500">No transactions yet</p>
          </div>
        `;
        lucide.createIcons();
        return;
      }
      
      container.innerHTML = transactions.map(tx => {
        const isCredit = tx.type === 'credit' || tx.type === 'received';
        const currency = userProfile?.currency || 'USD';
        const symbol = CURRENCY_SYMBOLS[currency] || '$';
        
        return `
          <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl">
            <div class="flex items-center space-x-3">
              <div class="w-10 h-10 rounded-full flex items-center justify-center ${isCredit ? 'bg-green-100' : 'bg-red-100'}">
                <i data-lucide="${isCredit ? 'arrow-down-right' : 'arrow-up-right'}" class="w-5 h-5 ${isCredit ? 'text-green-600' : 'text-red-600'}"></i>
              </div>
              <div>
                <p class="font-medium text-gray-900">${tx.description || (isCredit ? 'Received' : 'Sent')}</p>
                <p class="text-sm text-gray-500">${new Date(tx.created_at).toLocaleDateString()}</p>
              </div>
            </div>
            <span class="font-bold ${isCredit ? 'text-green-600' : 'text-red-600'}">
              ${isCredit ? '+' : '-'}${symbol}${tx.amount?.toLocaleString('en-US', { minimumFractionDigits: 2 })}
            </span>
          </div>
        `;
      }).join('');
      
      lucide.createIcons();
    }

    // Subscribe to real-time updates
    function subscribeToUpdates() {
      // Subscribe to profile changes
      supabase
        .channel('profile_changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles', filter: `id=eq.${currentUser.id}` }, (payload) => {
          userProfile = payload.new;
          updateBalanceDisplay();
          if (userProfile.status === 'frozen') {
            document.getElementById('freezeModal').classList.remove('hidden');
          }
        })
        .subscribe();
      
      // Subscribe to transaction changes
      supabase
        .channel('transaction_changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'transactions' }, () => {
          loadTransactions();
        })
        .subscribe();
    }

    // Load data on page load
    loadUserData();
  </script>
</body>
</html>
