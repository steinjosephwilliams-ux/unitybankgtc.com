<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNITY BANK GTC - Sign Up</title>
  
  <!-- Supabase Configuration -->
  <script>
    // Supabase Configuration
    const SUPABASE_URL = 'https://qrfkfvknvlagcithwhsh.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_hZ0CRvlLxSqNMzdHWqEuXA_SwWB3s9X';
  </script>
  
  <!-- Supabase Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #eff6ff 0%, #ffffff 50%, #eef2ff 100%); }
    .btn-primary { background: linear-gradient(135deg, #2e48b6 0%, #1d2f77 100%); }
    .btn-primary:hover { opacity: 0.9; }
  </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
  <!-- Back Button -->
  <button onclick="window.location.href='index.html'" class="absolute top-4 left-4 flex items-center text-gray-600 hover:text-[#2e48b6] transition-colors">
    <i data-lucide="arrow-left" class="w-5 h-5 mr-1"></i>
    Back
  </button>

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="index.html" class="inline-flex items-center space-x-2">
        <div class="w-12 h-12 btn-primary rounded-xl flex items-center justify-center">
          <span class="text-white font-bold text-xl">U</span>
        </div>
        <span class="font-bold text-2xl text-[#1d2f77]">UNITYBANKGTC</span>
      </a>
    </div>

    <!-- Sign Up Form -->
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <h1 class="text-2xl font-bold text-gray-900 text-center mb-2">Create Account</h1>
      <p class="text-gray-500 text-center mb-6">Sign up to get started with UNITY BANK GTC.</p>

      <form id="signupForm" class="space-y-4">
        <!-- Full Name -->
        <div class="space-y-2">
          <label for="fullName" class="block text-sm font-medium text-gray-700">Full Name</label>
          <div class="relative">
            <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
            <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required
              class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#2e48b6] focus:border-transparent outline-none transition-all">
          </div>
        </div>

        <!-- Email -->
        <div class="space-y-2">
          <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
          <div class="relative">
            <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
            <input type="email" id="email" name="email" placeholder="Enter your email" required
              class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#2e48b6] focus:border-transparent outline-none transition-all">
          </div>
        </div>

        <!-- Phone -->
        <div class="space-y-2">
          <label for="phone" class="block text-sm font-medium text-gray-700">Phone Number</label>
          <div class="relative">
            <i data-lucide="phone" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required
              class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#2e48b6] focus:border-transparent outline-none transition-all">
          </div>
        </div>

        <!-- Password -->
        <div class="space-y-2">
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <div class="relative">
            <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
            <input type="password" id="password" name="password" placeholder="Create a password" required minlength="6"
              class="w-full pl-10 pr-10 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#2e48b6] focus:border-transparent outline-none transition-all">
            <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <i data-lucide="eye" class="w-5 h-5" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="space-y-2">
          <label for="confirmPassword" class="block text-sm font-medium text-gray-700">Confirm Password</label>
          <div class="relative">
            <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required
              class="w-full pl-10 pr-10 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#2e48b6] focus:border-transparent outline-none transition-all">
            <button type="button" id="toggleConfirmPassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <i data-lucide="eye" class="w-5 h-5" id="confirmEyeIcon"></i>
            </button>
          </div>
        </div>

        <!-- Transaction PIN -->
        <div class="space-y-2">
          <label for="pin" class="block text-sm font-medium text-gray-700">Transaction PIN (4 digits)</label>
          <input type="password" id="pin" name="pin" placeholder="****" required maxlength="4" pattern="\d{4}"
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#2e48b6] focus:border-transparent outline-none transition-all text-center tracking-widest">
        </div>

        <!-- Submit Button -->
        <button type="submit" id="submitBtn"
          class="w-full btn-primary text-white font-medium py-3 rounded-xl transition-all flex items-center justify-center mt-6">
          <span id="btnText">Create Account</span>
          <div id="btnLoader" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin ml-2"></div>
        </button>
      </form>

      <!-- Login Link -->
      <div class="mt-6 text-center">
        <p class="text-gray-500">
          Already have an account? 
          <a href="login.html" class="text-[#2e48b6] font-medium hover:underline">Sign In</a>
        </p>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="fixed top-4 right-4 px-6 py-4 rounded-xl shadow-lg transform translate-x-full transition-transform duration-300 z-50 hidden">
    <div class="flex items-center space-x-3">
      <i data-lucide="alert-circle" class="w-5 h-5" id="toastIcon"></i>
      <span id="toastMessage"></span>
    </div>
  </div>

  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    // Initialize Supabase client
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Generate account number
    function generateAccountNumber() {
      return Math.floor(1000000000 + Math.random() * 9000000000).toString();
    }

    // Toggle password visibility
    document.getElementById('togglePassword').addEventListener('click', function() {
      const passwordInput = document.getElementById('password');
      const eyeIcon = document.getElementById('eyeIcon');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.setAttribute('data-lucide', 'eye-off');
      } else {
        passwordInput.type = 'password';
        eyeIcon.setAttribute('data-lucide', 'eye');
      }
      lucide.createIcons();
    });

    document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
      const passwordInput = document.getElementById('confirmPassword');
      const eyeIcon = document.getElementById('confirmEyeIcon');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.setAttribute('data-lucide', 'eye-off');
      } else {
        passwordInput.type = 'password';
        eyeIcon.setAttribute('data-lucide', 'eye');
      }
      lucide.createIcons();
    });

    // Show toast notification
    function showToast(message, type = 'error') {
      const toast = document.getElementById('toast');
      const toastMessage = document.getElementById('toastMessage');
      const toastIcon = document.getElementById('toastIcon');
      
      toastMessage.textContent = message;
      toast.classList.remove('hidden', 'translate-x-full');
      toast.classList.add('translate-x-0');
      
      if (type === 'success') {
        toast.classList.add('bg-green-500', 'text-white');
        toast.classList.remove('bg-red-500');
        toastIcon.setAttribute('data-lucide', 'check-circle');
      } else {
        toast.classList.add('bg-red-500', 'text-white');
        toast.classList.remove('bg-green-500');
        toastIcon.setAttribute('data-lucide', 'alert-circle');
      }
      lucide.createIcons();
      
      setTimeout(() => {
        toast.classList.add('translate-x-full');
        toast.classList.remove('translate-x-0');
        setTimeout(() => toast.classList.add('hidden'), 300);
      }, 3000);
    }

    // Handle signup form submission
    document.getElementById('signupForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const fullName = document.getElementById('fullName').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const pin = document.getElementById('pin').value;
      
      const btnText = document.getElementById('btnText');
      const btnLoader = document.getElementById('btnLoader');
      const submitBtn = document.getElementById('submitBtn');
      
      // Validation
      if (password !== confirmPassword) {
        showToast('Passwords do not match');
        return;
      }
      
      if (password.length < 6) {
        showToast('Password must be at least 6 characters');
        return;
      }
      
      if (pin.length !== 4) {
        showToast('PIN must be 4 digits');
        return;
      }
      
      // Show loading state
      btnText.textContent = 'Creating account...';
      btnLoader.classList.remove('hidden');
      submitBtn.disabled = true;
      
      try {
        // Register user with Supabase Auth
        const { data, error } = await supabase.auth.signUp({ email, password });
        
        if (error) throw error;
        if (!data.user) throw new Error('Registration failed');
        
        // Create user profile
        const { error: profileError } = await supabase.from('profiles').insert({
          id: data.user.id,
          full_name: fullName,
          email: email,
          phone: phone,
          account_number: generateAccountNumber(),
          account_type: 'savings',
          balance: 0,
          currency: 'USD',
          pin: pin,
          status: 'frozen',
          role: 'user',
          theme: 'light',
          card_design: 0,
          kyc_verified: false
        });
        
        if (profileError) throw profileError;
        
        showToast('Account created successfully! Please wait for admin approval.', 'success');
        
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);
        
      } catch (error) {
        showToast(error.message || 'Registration failed');
      } finally {
        btnText.textContent = 'Create Account';
        btnLoader.classList.add('hidden');
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
