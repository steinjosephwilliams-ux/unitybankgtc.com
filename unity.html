<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity Bank - Mobile Banking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f7;
            color: #1a1a1a;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: #fff;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #e3f2fd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1976d2;
            font-weight: 600;
        }

        .welcome-text {
            font-size: 14px;
            color: #666;
        }

        .user-name {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: none;
            background: #f5f5f7;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: #e8e8ec;
        }

        /* Main Content */
        .main-content {
            padding: 20px;
            padding-bottom: 100px;
        }

        /* Balance Card */
        .balance-card {
            background: linear-gradient(135deg, #1a1f36 0%, #2d3561 100%);
            border-radius: 24px;
            padding: 24px;
            color: white;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(26, 31, 54, 0.3);
        }

        .balance-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            pointer-events: none;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .card-label {
            font-size: 14px;
            opacity: 0.8;
            font-weight: 500;
        }

        .card-icon {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .balance-amount {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .account-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .status-badge {
            background: #22c55e;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .account-number {
            font-size: 14px;
            opacity: 0.8;
            font-family: monospace;
        }

        .card-actions {
            display: flex;
            gap: 12px;
        }

        .btn-primary {
            flex: 1;
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        .btn-secondary {
            flex: 1;
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .action-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #f0f0f0;
        }

        .action-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .action-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 24px;
        }

        .action-icon.purple {
            background: #f3e8ff;
            color: #9333ea;
        }

        .action-icon.green {
            background: #dcfce7;
            color: #16a34a;
        }

        .action-label {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
        }

        /* Recent Activity */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .see-all {
            font-size: 14px;
            color: #2563eb;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }

        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .activity-item {
            background: white;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #f0f0f0;
        }

        .activity-item:hover {
            background: #fafafa;
            transform: translateX(4px);
        }

        .activity-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .activity-icon.income {
            background: #dcfce7;
            color: #16a34a;
        }

        .activity-icon.expense {
            background: #fee2e2;
            color: #dc2626;
        }

        .activity-details {
            flex: 1;
        }

        .activity-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .activity-date {
            font-size: 13px;
            color: #6b7280;
        }

        .activity-amount {
            text-align: right;
        }

        .amount-value {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .amount-value.positive {
            color: #16a34a;
        }

        .amount-value.negative {
            color: #1a1a1a;
        }

        .status-text {
            font-size: 12px;
            color: #6b7280;
            background: #f3f4f6;
            padding: 2px 8px;
            border-radius: 6px;
            display: inline-block;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: white;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-around;
            padding: 12px 0 24px;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 4px 16px;
            border: none;
            background: none;
            color: #6b7280;
            transition: all 0.2s;
        }

        .nav-item.active {
            color: #be185d;
        }

        .nav-item:hover {
            color: #374151;
        }

        .nav-icon {
            font-size: 24px;
        }

        .nav-label {
            font-size: 12px;
            font-weight: 500;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 430px;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.3s;
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
        }

        .close-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: #f3f4f6;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #374151;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .submit-btn {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }

        .submit-btn:hover {
            background: #1d4ed8;
        }

        /* Animations */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: slideUp 0.5s ease-out;
        }

        /* Hide scrollbar */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="user-info">
            <div class="avatar">J</div>
            <div>
                <div class="welcome-text">Welcome back,</div>
                <div class="user-name">Jr</div>
            </div>
        </div>
        <div class="header-actions">
            <button class="icon-btn" onclick="showNotification()">⋯</button>
            <button class="icon-btn" onclick="closeApp()">✕</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Balance Card -->
        <div class="balance-card animate-in">
            <div class="card-header">
                <span class="card-label">Total Balance</span>
                <div class="card-icon">💳</div>
            </div>
            <div class="balance-amount" id="balance">$480,625,587.00</div>
            <div class="account-info">
                <span class="status-badge">Active</span>
                <span class="account-number">****8892</span>
            </div>
            <div class="card-actions">
                <button class="btn-primary" onclick="openSendModal()">
                    <span>➤</span>
                    Send Funds
                </button>
                <button class="btn-secondary" onclick="showHistory()">
                    <span>↻</span>
                    History
                </button>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions">
            <div class="action-card" onclick="showStatements()">
                <div class="action-icon purple">📄</div>
                <div class="action-label">Statements</div>
            </div>
            <div class="action-card" onclick="showServices()">
                <div class="action-icon green">🏛️</div>
                <div class="action-label">Services</div>
            </div>
        </div>

        <!-- Recent Activity -->
        <div class="section-header">
            <h2 class="section-title">Recent Activity</h2>
            <a href="#" class="see-all" onclick="showAllActivity()">See All</a>
        </div>

        <div class="activity-list" id="activityList">
            <div class="activity-item">
                <div class="activity-icon income">📈</div>
                <div class="activity-details">
                    <div class="activity-title">Self</div>
                    <div class="activity-date">Feb 15, 2026</div>
                </div>
                <div class="activity-amount">
                    <div class="amount-value positive">+$5,000,000.00</div>
                    <span class="status-text">Completed</span>
                </div>
            </div>

            <div class="activity-item">
                <div class="activity-icon expense">📉</div>
                <div class="activity-details">
                    <div class="activity-title">IRS Treasury</div>
                    <div class="activity-date">Feb 14, 2026</div>
                </div>
                <div class="activity-amount">
                    <div class="amount-value negative">$250,000.00</div>
                    <span class="status-text">Completed</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-item active" onclick="setActiveNav(this, 'dashboard')">
            <span class="nav-icon">🏦</span>
            <span class="nav-label">Dashboard</span>
        </button>
        <button class="nav-item" onclick="setActiveNav(this, 'history')">
            <span class="nav-icon">↻</span>
            <span class="nav-label">History</span>
        </button>
        <button class="nav-item" onclick="setActiveNav(this, 'statements')">
            <span class="nav-icon">📄</span>
            <span class="nav-label">Statements</span>
        </button>
        <button class="nav-item" onclick="setActiveNav(this, 'transfer')">
            <span class="nav-icon">➤</span>
            <span class="nav-label">Transfer</span>
        </button>
    </nav>

    <!-- Send Money Modal -->
    <div class="modal" id="sendModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Send Funds</h3>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>
            <form onsubmit="handleSend(event)">
                <div class="form-group">
                    <label class="form-label">Recipient Name</label>
                    <input type="text" class="form-input" placeholder="Enter recipient name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Account Number</label>
                    <input type="text" class="form-input" placeholder="Enter account number" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Amount</label>
                    <input type="number" class="form-input" placeholder="$0.00" required id="sendAmount">
                </div>
                <button type="submit" class="submit-btn">Send Money</button>
            </form>
        </div>
    </div>

    <script>
        // Balance management
        let currentBalance = 480625587.00;

        function updateBalanceDisplay() {
            document.getElementById('balance').textContent = 
                '$' + currentBalance.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        // Modal functions
        function openSendModal() {
            document.getElementById('sendModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('sendModal').classList.remove('active');
        }

        function handleSend(e) {
            e.preventDefault();
            const amount = parseFloat(document.getElementById('sendAmount').value);
            if (amount && amount > 0) {
                if (amount > currentBalance) {
                    alert('Insufficient funds!');
                    return;
                }
                currentBalance -= amount;
                updateBalanceDisplay();
                addActivity('Transfer', -amount, 'expense');
                closeModal();
                alert('Transfer successful!');
                e.target.reset();
            }
        }

        // Activity management
        function addActivity(title, amount, type) {
            const list = document.getElementById('activityList');
            const date = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            const icon = type === 'income' ? '📈' : '📉';
            const sign = type === 'income' ? '+' : '-';
            const amountClass = type === 'income' ? 'positive' : 'negative';
            
            const item = document.createElement('div');
            item.className = 'activity-item animate-in';
